<!doctype html>
<html lang="en">
<head>

<title>Late Night FM — Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['"IBM Plex Sans"', 'system-ui', 'sans-serif'],
          mono: ['"IBM Plex Mono"', 'ui-monospace', 'monospace'],
          serif: ['"Instrument Serif"', 'serif'],
        },
        borderRadius: { none: '0', DEFAULT: '0', sm:'0', md:'0', lg:'0', xl:'0', '2xl':'0', '3xl':'0' },
      },
    },
    corePlugins: { preflight: true },
  };
</script>
<style>
  :root {
    --accent: #E85D2F;
    --accent-soft: rgba(232,93,47,0.16);
    --bg: #0E0D0B;
    --bg-2: #161412;
    --fg: #F4EFE7;
    --fg-2: #A8A299;
    --fg-3: #6B6660;
    --line: rgba(255,255,255,0.08);
    --card: rgba(255,255,255,0.03);
  }
  html[data-theme="light"] {
    --bg: #F4EFE7;
    --bg-2: #E8E2D6;
    --fg: #14110D;
    --fg-2: #5A554D;
    --fg-3: #8C8780;
    --line: rgba(0,0,0,0.08);
    --card: rgba(0,0,0,0.025);
  }
  html, body { background: var(--bg); color: var(--fg); }
  body { font-family: '"IBM Plex Sans"', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  *:focus { outline: none; }
  /* Hide scrollbar but keep functional */
  .scroll-soft::-webkit-scrollbar { width: 8px; }
  .scroll-soft::-webkit-scrollbar-thumb { background: rgba(127,127,127,0.25); }

  /* Pulsing live dot */
  @keyframes live-pulse { 0%,100% { opacity:1; transform: scale(1);} 50% { opacity:.45; transform: scale(.85);} }
  .live-dot { animation: live-pulse 1.4s ease-in-out infinite; }

  /* Equalizer bars */
  @keyframes eq-1 { 0%,100% { height: 30%; } 50% { height: 100%; } }
  @keyframes eq-2 { 0%,100% { height: 80%; } 50% { height: 25%; } }
  @keyframes eq-3 { 0%,100% { height: 50%; } 50% { height: 95%; } }
  @keyframes eq-4 { 0%,100% { height: 95%; } 50% { height: 40%; } }
  @keyframes eq-5 { 0%,100% { height: 40%; } 50% { height: 85%; } }
  .eq-bar { animation-duration: 0.9s; animation-iteration-count: infinite; animation-timing-function: ease-in-out; }
  .eq-paused { animation-play-state: paused !important; height: 20% !important; }

  /* Vinyl spin */
  @keyframes spin-slow { from { transform: rotate(0); } to { transform: rotate(360deg);} }
  .vinyl-spin { animation: spin-slow 18s linear infinite; }
  .vinyl-paused { animation-play-state: paused; }

  /* Drawer */
  @keyframes drawer-in { from { transform: translateX(100%);} to { transform: translateX(0);} }
  @keyframes drawer-out { from { transform: translateX(0);} to { transform: translateX(100%);} }
  @keyframes fade-in { from { opacity:0;} to {opacity:1;} }
  @keyframes fade-out { from { opacity:1;} to {opacity:0;} }
  .drawer-enter { animation: drawer-in 240ms cubic-bezier(0.22,1,0.36,1) both; }
  .drawer-leave { animation: drawer-out 200ms cubic-bezier(0.4,0,1,1) both; }
  .fade-enter { animation: fade-in 200ms ease-out both; }
  .fade-leave { animation: fade-out 160ms ease-in both; }

  /* Ambient glow keyed off album art */
  .ambient {
    position: absolute; inset: -20%;
    background: radial-gradient(60% 50% at 30% 30%, var(--ambient-1, var(--accent)) 0%, transparent 60%),
                radial-gradient(60% 50% at 70% 70%, var(--ambient-2, var(--accent)) 0%, transparent 65%);
    filter: blur(80px); opacity: 0.55;
    z-index: 0; pointer-events: none;
    transition: opacity 600ms ease;
  }
  html[data-theme="light"] .ambient { opacity: 0.35; }

  /* Range slider — custom thumb */
  input[type="range"].slider {
    -webkit-appearance: none; appearance: none;
    height: 4px; background: var(--line); cursor: pointer;
  }
  input[type="range"].slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 12px; height: 12px; background: var(--fg);
    border: 0; cursor: pointer;
  }
  input[type="range"].slider::-moz-range-thumb {
    width: 12px; height: 12px; background: var(--fg);
    border: 0; cursor: pointer;
  }

  /* Toast */
  @keyframes toast-in { from { transform: translateY(8px); opacity:0;} to { transform: translateY(0); opacity:1;} }
  .toast { animation: toast-in 200ms ease-out both; }

  /* Marquee for long titles */
  @keyframes marquee { 0% { transform: translateX(0);} 100% { transform: translateX(-50%);} }
  .marquee-track { animation: marquee 24s linear infinite; }

  /* Sharp focus ring */
  .focus-ring:focus-visible { box-shadow: 0 0 0 2px var(--accent); }

  /* Util */
  .border-line { border-color: var(--line); }
  .text-fg2 { color: var(--fg-2); }
  .text-fg3 { color: var(--fg-3); }
  .bg-card { background: var(--card); }
  .bg-bg2 { background: var(--bg-2); }
</style>
</head>
<body class="min-h-screen overflow-x-hidden">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ─────────────────────── Inline icons ───────────────────────
const I = (paths, opts={}) => ({ size=18, className='', strokeWidth=1.75, ...rest }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={opts.fill||'none'} stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} {...rest}>{paths}</svg>
);
const Play = I(<polygon points="6 4 20 12 6 20 6 4" />, { fill: 'currentColor' });
const Pause = I(<><rect x="6" y="4" width="4" height="16" fill="currentColor" /><rect x="14" y="4" width="4" height="16" fill="currentColor" /></>);
const Volume = I(<><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></>);
const VolumeMute = I(<><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></>);
const Heart = I(<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>);
const HeartFill = I(<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="currentColor"/>);
const Share = I(<><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></>);
const Settings = I(<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>);
const X = I(<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>);
const Check = I(<polyline points="20 6 9 17 4 12"/>);
const Copy = I(<><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>);
const ChevronDown = I(<polyline points="6 9 12 15 18 9"/>);
const ChevronRight = I(<polyline points="9 18 15 12 9 6"/>);
const Twitter = I(<path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/>);
const Instagram = I(<><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></>);
const Globe = I(<><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>);
const Radio = I(<><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><circle cx="12" cy="12" r="2" fill="currentColor"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9c3.9 3.9 3.9 10.3 0 14.2"/></>);
const Sun = I(<><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></>);
const Moon = I(<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>);
const Clock = I(<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>);
const Users = I(<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.9"/><path d="M16 3.1a4 4 0 0 1 0 7.8"/></>);
const Disc = I(<><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></>);

// ─────────────────────── Data ───────────────────────
const TRACKS = [
  { title: 'Cosmic Drift',           artist: 'Echo Valley',          album: 'Neon Pastures',     duration: 273, color: ['#E85D2F','#7B2D8E'] },
  { title: 'Midnight Cassette',      artist: 'Soft Coast',           album: 'After Hours, vol II', duration: 198, color: ['#1E6F8C','#0E0D0B'] },
  { title: 'Paper Birds',            artist: 'Yuki & The Mountain',  album: 'Slow Light',        duration: 312, color: ['#D9A441','#3A2E1F'] },
  { title: 'Bloom in Static',        artist: 'June Halloran',        album: 'Untitled VII',      duration: 244, color: ['#C84B6C','#22132A'] },
  { title: 'Departures',             artist: 'Tinder Field',         album: 'Departures EP',     duration: 187, color: ['#3A6B5E','#0E1614'] },
  { title: 'Lavender Mile',          artist: 'Astra Veil',           album: 'Wide Open',         duration: 222, color: ['#7C5CC7','#1B1330'] },
  { title: 'Petrichor',              artist: 'Honeyglass',           album: 'Garden Tapes',      duration: 261, color: ['#5D8C40','#1A2412'] },
];

const SCHEDULE = [
  { time: '20:00', title: 'Late Night FM',           host: 'Selin Aksoy',     status: 'on-air', tag: 'Indie · Lo-Fi' },
  { time: '22:00', title: 'Slow Burn Sessions',      host: 'Marcus Vega',     status: 'next',   tag: 'Ambient · Jazz' },
  { time: '00:00', title: 'After Hours',             host: 'Yuki Tanaka',     status: 'later',  tag: 'House · Disco' },
  { time: '03:00', title: 'Field Recordings',        host: 'Esther Lindgren', status: 'later',  tag: 'Experimental' },
];

const ACCENT_OPTIONS = [
  { name: 'Sunset',  value: '#E85D2F', soft: 'rgba(232,93,47,0.16)' },
  { name: 'Tangerine', value: '#F0A040', soft: 'rgba(240,160,64,0.16)' },
  { name: 'Forest',  value: '#3D8B5E', soft: 'rgba(61,139,94,0.16)' },
  { name: 'Cobalt',  value: '#2B6FE0', soft: 'rgba(43,111,224,0.16)' },
  { name: 'Violet',  value: '#7B5CC7', soft: 'rgba(123,92,199,0.16)' },
  { name: 'Magenta', value: '#D4407C', soft: 'rgba(212,64,124,0.16)' },
  { name: 'Crimson', value: '#C13C3C', soft: 'rgba(193,60,60,0.16)' },
  { name: 'Bone',    value: '#D9D2C6', soft: 'rgba(217,210,198,0.16)' },
];

const LAYOUTS = [
  { id: 'split', label: 'Split' },
  { id: 'centered', label: 'Centered' },
];

// ─────────────────────── Persistent config ───────────────────────
const DEFAULT_CONFIG = {
  stationName: 'Late Night FM',
  tagline: 'Independent radio for the slow hours.',
  description: 'Broadcasting from a one-room studio in Kadıköy since 2022. Late night sessions, slow indie, jazz fragments, and field recordings.',
  initials: 'LN',
  accent: '#E85D2F',
  accentSoft: 'rgba(232,93,47,0.16)',
  theme: 'dark',
  layout: 'split',
  ambient: true,
  showSchedule: true,
  showHistory: true,
  showAbout: true,
  socials: {
    twitter: 'latenightfm',
    instagram: 'latenight.fm',
    website: 'latenight.fm',
  },
};

const loadConfig = () => {
  try {
    const raw = localStorage.getItem('kast.player.config');
    if (!raw) return DEFAULT_CONFIG;
    return { ...DEFAULT_CONFIG, ...JSON.parse(raw) };
  } catch { return DEFAULT_CONFIG; }
};
const saveConfig = (c) => { try { localStorage.setItem('kast.player.config', JSON.stringify(c)); } catch {} };

// ─────────────────────── Utils ───────────────────────
const fmtTime = (s) => {
  s = Math.max(0, Math.floor(s));
  const m = Math.floor(s/60), r = s % 60;
  return `${m}:${r.toString().padStart(2,'0')}`;
};
const cx = (...a) => a.filter(Boolean).join(' ');

// ─────────────────────── Toast ───────────────────────
const ToastCtx = React.createContext({ push: () => {} });
const ToastProvider = ({ children }) => {
  const [items, setItems] = useState([]);
  const push = useCallback((msg) => {
    const id = Math.random().toString(36).slice(2);
    setItems(s => [...s, { id, msg }]);
    setTimeout(() => setItems(s => s.filter(x => x.id !== id)), 2200);
  }, []);
  return (
    <ToastCtx.Provider value={{ push }}>
      {children}
      <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none">
        {items.map(t => (
          <div key={t.id} className="toast pointer-events-auto bg-bg2 border border-line px-4 py-2.5 text-[13px] font-mono" style={{color:'var(--fg)'}}>{t.msg}</div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
};
const useToast = () => React.useContext(ToastCtx);

// ─────────────────────── AlbumArt ───────────────────────
const AlbumArt = ({ track, size=480, playing, onPlayToggle, big=false }) => {
  const [c1, c2] = track.color;
  return (
    <div
      className="relative group select-none"
      style={{ width: size, height: size, maxWidth: '100%', aspectRatio: '1 / 1' }}
    >
      {/* Gradient block (album cover) */}
      <div
        className="absolute inset-0"
        style={{ background: `linear-gradient(135deg, ${c1} 0%, ${c2} 100%)` }}
      />
      {/* Texture */}
      <div className="absolute inset-0 opacity-20 mix-blend-overlay" style={{
        backgroundImage: 'radial-gradient(circle at 30% 20%, rgba(255,255,255,0.4) 0%, transparent 40%), radial-gradient(circle at 70% 80%, rgba(0,0,0,0.5) 0%, transparent 50%)',
      }}/>
      {/* Album title overlay (editorial) */}
      <div className="absolute inset-0 p-6 flex flex-col justify-between text-white">
        <div className="flex items-start justify-between">
          <div className="font-mono text-[10px] tracking-[0.2em] uppercase opacity-70">— Side A</div>
          <div className="font-mono text-[10px] tracking-[0.2em] uppercase opacity-70">{fmtTime(track.duration)}</div>
        </div>
        <div>
          <div className="font-serif italic text-[28px] leading-[1.05] tracking-tight" style={{textWrap:'balance'}}>{track.album}</div>
          <div className="font-mono text-[11px] tracking-wider uppercase opacity-80 mt-2">{track.artist}</div>
        </div>
      </div>
      {/* Vinyl peek */}
      {big && (
        <div className="absolute -right-12 top-1/2 -translate-y-1/2 w-1/2 h-[80%] hidden lg:block pointer-events-none">
          <div className={cx("relative w-full h-full rounded-full vinyl-spin", !playing && 'vinyl-paused')} style={{
            background: 'radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 40%, #1a1a1a 41%, #0a0a0a 60%, #1a1a1a 61%, #0a0a0a 100%)',
            boxShadow: '0 20px 60px rgba(0,0,0,0.5)',
          }}>
            <div className="absolute inset-[40%] rounded-full" style={{ background: `linear-gradient(135deg, ${c1} 0%, ${c2} 100%)` }}/>
            <div className="absolute inset-[47%] rounded-full bg-black"/>
          </div>
        </div>
      )}
      {/* Play overlay button (centered, on hover for big) */}
      <button
        onClick={onPlayToggle}
        className="absolute inset-0 flex items-center justify-center focus-ring"
        aria-label={playing ? 'Pause' : 'Play'}
      >
        <div className={cx(
          "w-20 h-20 flex items-center justify-center transition-all",
          "bg-white text-black",
          big ? 'opacity-0 group-hover:opacity-100 scale-95 group-hover:scale-100' : 'opacity-100'
        )}>
          {playing ? <Pause size={28}/> : <Play size={28} className="translate-x-0.5"/>}
        </div>
      </button>
    </div>
  );
};

// ─────────────────────── Equalizer bars ───────────────────────
const Eq = ({ playing, className='' }) => (
  <div className={cx('flex items-end gap-[3px] w-[28px] h-[18px]', className)}>
    {[1,2,3,4,5].map(i => (
      <div key={i}
        className={cx("eq-bar w-[3px] bg-current", !playing && 'eq-paused')}
        style={{ animationName: `eq-${i}`, animationDelay: `${i*0.07}s` }}
      />
    ))}
  </div>
);

// ─────────────────────── Player core ───────────────────────
const PlayerCore = ({ config }) => {
  const toast = useToast();
  const [idx, setIdx] = useState(0);
  const [playing, setPlaying] = useState(true);
  const [elapsed, setElapsed] = useState(42); // pretend already 42s into track
  const [volume, setVolume] = useState(75);
  const [muted, setMuted] = useState(false);
  const [liked, setLiked] = useState(false);
  const [history, setHistory] = useState([6,5,4,3,2,1]); // indices, newest first
  const [listeners, setListeners] = useState(847);

  const track = TRACKS[idx];

  // Tick elapsed
  useEffect(() => {
    if (!playing) return;
    const t = setInterval(() => {
      setElapsed(e => {
        if (e + 1 >= track.duration) {
          // Skip to next; push current to history
          setHistory(h => [idx, ...h.filter(i => i !== idx)].slice(0, 8));
          setIdx(i => (i + 1) % TRACKS.length);
          setLiked(false);
          return 0;
        }
        return e + 1;
      });
    }, 1000);
    return () => clearInterval(t);
  }, [playing, track.duration, idx]);

  // Wiggle listeners count for realism
  useEffect(() => {
    const t = setInterval(() => {
      setListeners(l => Math.max(700, l + Math.floor((Math.random()-0.5)*8)));
    }, 4000);
    return () => clearInterval(t);
  }, []);

  // Ambient glow colors keyed off album art
  useEffect(() => {
    document.documentElement.style.setProperty('--ambient-1', track.color[0]);
    document.documentElement.style.setProperty('--ambient-2', track.color[1]);
  }, [idx]);

  const togglePlay = () => setPlaying(p => !p);
  const skip = () => {
    setHistory(h => [idx, ...h.filter(i => i !== idx)].slice(0, 8));
    setIdx(i => (i + 1) % TRACKS.length);
    setElapsed(0);
    setLiked(false);
  };
  const share = () => {
    navigator.clipboard?.writeText(window.location.href);
    toast.push('Link copied to clipboard');
  };
  const handleLike = () => {
    setLiked(l => !l);
    toast.push(liked ? 'Removed from likes' : 'Added to likes');
  };

  return (
    <div className="relative">
      {/* Layout: split or centered */}
      {config.layout === 'split' ? (
        <div className="grid grid-cols-1 lg:grid-cols-[480px_1fr] gap-10 lg:gap-14 items-start">
          {/* Left — Art */}
          <div className="relative">
            <AlbumArt track={track} playing={playing} onPlayToggle={togglePlay} big/>
            {/* Mini info under art on mobile */}
            <div className="mt-4 font-mono text-[11px] uppercase tracking-wider text-fg3">{track.album} · {track.artist}</div>
          </div>
          {/* Right — Track + controls */}
          <div className="flex flex-col">
            <LiveStrip listeners={listeners} accent={config.accent} playing={playing} />
            <h1 className="mt-6 font-serif text-[64px] md:text-[80px] leading-[0.95] tracking-tight" style={{textWrap:'balance'}}>
              {track.title}
            </h1>
            <div className="mt-4 flex items-center gap-3">
              <span className="font-mono text-[13px] uppercase tracking-wider text-fg2">{track.artist}</span>
              <span className="text-fg3">·</span>
              <span className="font-mono text-[13px] text-fg3">{track.album}</span>
            </div>

            {/* Progress + controls */}
            <Controls
              elapsed={elapsed}
              duration={track.duration}
              playing={playing}
              togglePlay={togglePlay}
              skip={skip}
              volume={volume}
              setVolume={setVolume}
              muted={muted}
              setMuted={setMuted}
              liked={liked}
              onLike={handleLike}
              onShare={share}
              accent={config.accent}
            />
          </div>
        </div>
      ) : (
        // Centered layout
        <div className="flex flex-col items-center text-center max-w-2xl mx-auto">
          <LiveStrip listeners={listeners} accent={config.accent} playing={playing} />
          <div className="mt-8">
            <AlbumArt track={track} size={360} playing={playing} onPlayToggle={togglePlay} />
          </div>
          <h1 className="mt-8 font-serif text-[48px] md:text-[64px] leading-[0.95] tracking-tight" style={{textWrap:'balance'}}>{track.title}</h1>
          <div className="mt-3 font-mono text-[13px] uppercase tracking-wider text-fg2">{track.artist} · {track.album}</div>
          <div className="w-full mt-8">
            <Controls
              elapsed={elapsed}
              duration={track.duration}
              playing={playing}
              togglePlay={togglePlay}
              skip={skip}
              volume={volume}
              setVolume={setVolume}
              muted={muted}
              setMuted={setMuted}
              liked={liked}
              onLike={handleLike}
              onShare={share}
              accent={config.accent}
            />
          </div>
        </div>
      )}

      {/* Below: history + schedule + about */}
      <div className="mt-20 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
        {config.showHistory && <HistoryPanel history={history} accent={config.accent} />}
        {config.showSchedule && <SchedulePanel accent={config.accent} />}
        {config.showAbout && <AboutPanel config={config} />}
      </div>
    </div>
  );
};

// ─────────────────────── Live strip ───────────────────────
const LiveStrip = ({ listeners, accent, playing }) => (
  <div className="flex items-center gap-4 flex-wrap">
    <div className="inline-flex items-center gap-2 px-2.5 py-1 border" style={{ borderColor: accent, color: accent, background: 'var(--accent-soft)' }}>
      <span className="w-1.5 h-1.5 live-dot" style={{ background: accent }}/>
      <span className="font-mono text-[11px] tracking-[0.18em] uppercase font-medium">On Air</span>
    </div>
    <div className="inline-flex items-center gap-1.5 font-mono text-[12px] text-fg2">
      <Users size={13}/>
      <span className="tabular-nums">{listeners.toLocaleString()}</span>
      <span className="text-fg3">listening</span>
    </div>
    <div className="inline-flex items-center gap-1.5 font-mono text-[12px] text-fg2">
      <Eq playing={playing}/>
      <span className="text-fg3">128 kbps · AAC</span>
    </div>
  </div>
);

// ─────────────────────── Controls bar ───────────────────────
const Controls = ({ elapsed, duration, playing, togglePlay, skip, volume, setVolume, muted, setMuted, liked, onLike, onShare, accent }) => {
  const pct = (elapsed / duration) * 100;
  return (
    <div className="mt-10">
      {/* Progress */}
      <div className="flex items-center gap-3 mb-5">
        <span className="font-mono text-[11px] text-fg3 tabular-nums w-10">{fmtTime(elapsed)}</span>
        <div className="flex-1 h-[3px] bg-line relative overflow-hidden">
          <div className="absolute inset-y-0 left-0" style={{ width: pct + '%', background: accent }}/>
        </div>
        <span className="font-mono text-[11px] text-fg3 tabular-nums w-10 text-right">-{fmtTime(duration - elapsed)}</span>
      </div>

      {/* Buttons row */}
      <div className="flex items-center gap-2 flex-wrap">
        {/* Big play button */}
        <button
          onClick={togglePlay}
          className="w-14 h-14 flex items-center justify-center transition-colors focus-ring"
          style={{ background: accent, color: '#fff' }}
          aria-label={playing ? 'Pause' : 'Play'}
        >
          {playing ? <Pause size={22}/> : <Play size={22} className="translate-x-0.5"/>}
        </button>

        {/* Skip */}
        <button
          onClick={skip}
          className="h-14 px-4 border border-line text-[12px] font-mono uppercase tracking-wider hover:bg-card transition-colors focus-ring"
        >Skip Track</button>

        {/* Like */}
        <button
          onClick={onLike}
          className={cx("h-14 w-14 flex items-center justify-center border border-line transition-colors focus-ring", liked ? '' : 'hover:bg-card')}
          style={liked ? { color: accent, borderColor: accent } : {}}
          aria-label={liked ? 'Unlike' : 'Like'}
        >
          {liked ? <HeartFill size={18}/> : <Heart size={18}/>}
        </button>

        {/* Share */}
        <button
          onClick={onShare}
          className="h-14 w-14 flex items-center justify-center border border-line hover:bg-card transition-colors focus-ring"
          aria-label="Share"
        >
          <Share size={18}/>
        </button>

        {/* Volume */}
        <div className="flex items-center gap-3 ml-auto border border-line h-14 px-3 min-w-[180px]">
          <button onClick={() => setMuted(m => !m)} className="text-fg2 hover:text-current transition-colors" aria-label="Mute">
            {muted || volume === 0 ? <VolumeMute size={16}/> : <Volume size={16}/>}
          </button>
          <input
            type="range" min="0" max="100" value={muted ? 0 : volume}
            onChange={(e) => { setVolume(Number(e.target.value)); if (Number(e.target.value) > 0) setMuted(false); }}
            className="slider flex-1"
            style={{ background: `linear-gradient(to right, ${accent} 0%, ${accent} ${muted?0:volume}%, var(--line) ${muted?0:volume}%, var(--line) 100%)` }}
          />
          <span className="font-mono text-[11px] text-fg3 tabular-nums w-7 text-right">{muted ? 0 : volume}</span>
        </div>
      </div>
    </div>
  );
};

// ─────────────────────── History panel ───────────────────────
const HistoryPanel = ({ history, accent }) => (
  <section>
    <SectionHead label="Recently Played" />
    <ul className="mt-5 divide-y border-y border-line">
      {history.slice(0,6).map((trackIdx, i) => {
        const t = TRACKS[trackIdx];
        return (
          <li key={i} className="flex items-center gap-3 py-3 group">
            <div className="w-10 h-10 shrink-0" style={{ background: `linear-gradient(135deg, ${t.color[0]} 0%, ${t.color[1]} 100%)` }}/>
            <div className="min-w-0 flex-1">
              <div className="text-[14px] truncate">{t.title}</div>
              <div className="font-mono text-[11px] text-fg3 truncate">{t.artist}</div>
            </div>
            <div className="font-mono text-[11px] text-fg3 tabular-nums">{['12s','3m','7m','12m','18m','24m'][i] || `${(i+1)*5}m`}</div>
          </li>
        );
      })}
    </ul>
  </section>
);

// ─────────────────────── Schedule panel ───────────────────────
const SchedulePanel = ({ accent }) => (
  <section>
    <SectionHead label="Today's Schedule" />
    <ul className="mt-5 divide-y border-y border-line">
      {SCHEDULE.map((s, i) => {
        const onAir = s.status === 'on-air';
        return (
          <li key={i} className="flex items-start gap-4 py-4">
            <div className="font-mono text-[12px] tabular-nums w-12 shrink-0 mt-0.5" style={{ color: onAir ? accent : 'var(--fg-3)' }}>{s.time}</div>
            <div className="min-w-0 flex-1">
              <div className="flex items-center gap-2">
                <span className={cx("text-[14px]", onAir && 'font-semibold')}>{s.title}</span>
                {onAir && (
                  <span className="inline-flex items-center gap-1 font-mono text-[9px] tracking-[0.2em] uppercase px-1.5 py-0.5" style={{background: 'var(--accent-soft)', color: accent}}>
                    <span className="w-1 h-1 live-dot" style={{background:accent}}/>Live
                  </span>
                )}
                {s.status === 'next' && (
                  <span className="font-mono text-[9px] tracking-[0.2em] uppercase text-fg3">Up Next</span>
                )}
              </div>
              <div className="font-mono text-[11px] text-fg3 mt-0.5">{s.host} · {s.tag}</div>
            </div>
          </li>
        );
      })}
    </ul>
  </section>
);

// ─────────────────────── About panel ───────────────────────
const AboutPanel = ({ config }) => (
  <section>
    <SectionHead label={`About ${config.stationName}`} />
    <p className="mt-5 text-[14px] leading-relaxed text-fg2" style={{textWrap:'pretty'}}>
      {config.description}
    </p>
    <div className="mt-5 flex flex-col gap-2.5">
      {config.socials.twitter && (
        <a href={`https://twitter.com/${config.socials.twitter}`} className="inline-flex items-center gap-2.5 text-[13px] hover:opacity-70 transition-opacity">
          <Twitter size={14} className="text-fg3"/>
          <span className="font-mono">@{config.socials.twitter}</span>
        </a>
      )}
      {config.socials.instagram && (
        <a href={`https://instagram.com/${config.socials.instagram}`} className="inline-flex items-center gap-2.5 text-[13px] hover:opacity-70 transition-opacity">
          <Instagram size={14} className="text-fg3"/>
          <span className="font-mono">@{config.socials.instagram}</span>
        </a>
      )}
      {config.socials.website && (
        <a href={`https://${config.socials.website}`} className="inline-flex items-center gap-2.5 text-[13px] hover:opacity-70 transition-opacity">
          <Globe size={14} className="text-fg3"/>
          <span className="font-mono">{config.socials.website}</span>
        </a>
      )}
    </div>
  </section>
);

const SectionHead = ({ label }) => (
  <div className="flex items-baseline gap-3">
    <h2 className="font-mono text-[11px] tracking-[0.2em] uppercase text-fg3">{label}</h2>
    <div className="flex-1 h-px bg-line"/>
  </div>
);

// ─────────────────────── Customize drawer ───────────────────────
const CustomizeDrawer = ({ open, onClose, config, setConfig }) => {
  const [render, setRender] = useState(open);
  const [leaving, setLeaving] = useState(false);
  useEffect(() => {
    if (open) { setRender(true); setLeaving(false); }
    else if (render) { setLeaving(true); const t = setTimeout(() => setRender(false), 220); return () => clearTimeout(t); }
  }, [open]);
  if (!render) return null;

  const set = (patch) => setConfig({ ...config, ...patch });
  const setSocial = (k, v) => setConfig({ ...config, socials: { ...config.socials, [k]: v }});
  const reset = () => setConfig(DEFAULT_CONFIG);

  return (
    <div className="fixed inset-0 z-[80]">
      <div className={cx("absolute inset-0 bg-black/40", leaving ? 'fade-leave' : 'fade-enter')} onClick={onClose}/>
      <div className={cx("absolute right-0 top-0 h-full w-[400px] max-w-[92vw] bg-bg2 border-l border-line shadow-2xl flex flex-col", leaving ? 'drawer-leave' : 'drawer-enter')}>
        <div className="flex items-center justify-between px-5 h-14 border-b border-line">
          <div>
            <div className="font-mono text-[10px] tracking-[0.2em] uppercase text-fg3">Customize</div>
            <div className="text-[15px] font-semibold mt-0.5">Player settings</div>
          </div>
          <button onClick={onClose} className="w-8 h-8 flex items-center justify-center hover:bg-card focus-ring"><X size={16}/></button>
        </div>
        <div className="flex-1 overflow-y-auto scroll-soft px-5 py-5 space-y-7">
          {/* Station identity */}
          <Section title="Identity">
            <Field label="Station name">
              <Input value={config.stationName} onChange={(v) => set({ stationName: v, initials: v.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase() || 'K' })} />
            </Field>
            <Field label="Tagline">
              <Input value={config.tagline} onChange={(v) => set({ tagline: v })} />
            </Field>
            <Field label="Description">
              <Textarea value={config.description} onChange={(v) => set({ description: v })} rows={4} />
            </Field>
          </Section>

          {/* Appearance */}
          <Section title="Appearance">
            <Field label="Theme">
              <Segmented
                value={config.theme}
                onChange={(v) => set({ theme: v })}
                items={[
                  { value: 'dark', label: <><Moon size={13}/><span>Dark</span></> },
                  { value: 'light', label: <><Sun size={13}/><span>Light</span></> },
                ]}
              />
            </Field>
            <Field label="Layout">
              <Segmented value={config.layout} onChange={(v) => set({ layout: v })} items={LAYOUTS.map(l => ({value: l.id, label: l.label}))}/>
            </Field>
            <Field label="Accent">
              <div className="grid grid-cols-4 gap-2">
                {ACCENT_OPTIONS.map(c => (
                  <button
                    key={c.value}
                    onClick={() => set({ accent: c.value, accentSoft: c.soft })}
                    className="aspect-square relative focus-ring"
                    style={{ background: c.value }}
                    aria-label={c.name}
                  >
                    {config.accent === c.value && (
                      <div className="absolute inset-1 border-2 border-white/90"/>
                    )}
                  </button>
                ))}
              </div>
            </Field>
            <Field label="Ambient glow">
              <Toggle checked={config.ambient} onChange={(v) => set({ ambient: v })} desc="Color-shifting background keyed to album art"/>
            </Field>
          </Section>

          {/* Sections */}
          <Section title="Sections">
            <Toggle checked={config.showHistory}  onChange={(v) => set({ showHistory: v })}  desc="Recently played tracks"/>
            <Toggle checked={config.showSchedule} onChange={(v) => set({ showSchedule: v })} desc="Today's programming"/>
            <Toggle checked={config.showAbout}    onChange={(v) => set({ showAbout: v })}    desc="About / social links"/>
          </Section>

          {/* Social */}
          <Section title="Links">
            <Field label="Twitter handle">
              <Input value={config.socials.twitter} onChange={(v) => setSocial('twitter', v)} prefix="@"/>
            </Field>
            <Field label="Instagram handle">
              <Input value={config.socials.instagram} onChange={(v) => setSocial('instagram', v)} prefix="@"/>
            </Field>
            <Field label="Website">
              <Input value={config.socials.website} onChange={(v) => setSocial('website', v)} prefix="https://"/>
            </Field>
          </Section>
        </div>
        <div className="border-t border-line p-4 flex items-center justify-between">
          <button onClick={reset} className="font-mono text-[11px] uppercase tracking-wider text-fg3 hover:text-current transition-colors">Reset to defaults</button>
          <button onClick={onClose} className="h-9 px-4 font-mono text-[11px] uppercase tracking-wider text-white" style={{background: config.accent}}>Done</button>
        </div>
      </div>
    </div>
  );
};

const Section = ({ title, children }) => (
  <section>
    <h3 className="font-mono text-[10px] tracking-[0.2em] uppercase text-fg3 mb-3">{title}</h3>
    <div className="space-y-4">{children}</div>
  </section>
);

const Field = ({ label, children }) => (
  <div>
    <div className="text-[12px] mb-1.5 text-fg2">{label}</div>
    {children}
  </div>
);

const Input = ({ value, onChange, prefix }) => (
  <div className="flex items-center border border-line bg-bg2 focus-within:border-current transition-colors">
    {prefix && <span className="pl-3 font-mono text-[12px] text-fg3 select-none">{prefix}</span>}
    <input
      type="text"
      value={value}
      onChange={(e) => onChange(e.target.value)}
      className="bg-transparent flex-1 px-3 h-9 text-[13px] outline-none"
      style={{color: 'var(--fg)'}}
    />
  </div>
);
const Textarea = ({ value, onChange, rows=3 }) => (
  <textarea
    value={value} rows={rows}
    onChange={(e) => onChange(e.target.value)}
    className="w-full border border-line bg-bg2 px-3 py-2 text-[13px] outline-none focus:border-current transition-colors resize-none"
    style={{color: 'var(--fg)'}}
  />
);
const Segmented = ({ value, onChange, items }) => (
  <div className="flex border border-line">
    {items.map(it => (
      <button
        key={it.value}
        onClick={() => onChange(it.value)}
        className={cx("flex-1 h-9 flex items-center justify-center gap-1.5 font-mono text-[11px] uppercase tracking-wider transition-colors",
          value === it.value ? 'text-current bg-card' : 'text-fg3 hover:text-current')}
      >{it.label}</button>
    ))}
  </div>
);
const Toggle = ({ checked, onChange, desc }) => (
  <button onClick={() => onChange(!checked)} className="w-full flex items-center justify-between gap-3 group">
    <span className="text-[13px] text-left text-fg2 group-hover:text-current transition-colors">{desc}</span>
    <span className={cx("w-9 h-5 relative shrink-0 transition-colors", checked ? '' : 'bg-line')} style={checked ? {background: 'var(--accent)'} : {}}>
      <span className={cx("absolute top-0.5 w-4 h-4 bg-white transition-all", checked ? 'left-[18px]' : 'left-0.5')}/>
    </span>
  </button>
);

// ─────────────────────── Footer ───────────────────────
const Footer = ({ accent }) => (
  <footer className="mt-24 pt-8 border-t border-line">
    <div className="flex items-end justify-between gap-6 flex-wrap">
      <div className="font-mono text-[11px] text-fg3 leading-relaxed">
        © {new Date().getFullYear()} Late Night FM<br/>
        Broadcasting from Kadıköy, Istanbul
      </div>
      <a
        href="https://github.com/yourorg/kast"
        target="_blank"
        rel="noreferrer"
        className="group inline-flex items-center gap-3 border border-line px-3 py-2.5 hover:bg-card transition-colors"
      >
        <div className="w-6 h-6 flex items-center justify-center text-white font-mono text-[11px] font-bold" style={{background: accent}}>K</div>
        <div className="leading-tight">
          <div className="font-mono text-[9px] tracking-[0.2em] uppercase text-fg3">Powered by</div>
          <div className="font-mono text-[13px] font-semibold tracking-tight -mt-0.5">Kast</div>
        </div>
        <ChevronRight size={13} className="text-fg3 group-hover:text-current group-hover:translate-x-0.5 transition-all"/>
      </a>
    </div>
  </footer>
);

// ─────────────────────── App ───────────────────────
const App = () => {
  const [config, setConfig] = useState(loadConfig);
  const [customizeOpen, setCustomizeOpen] = useState(false);

  useEffect(() => { saveConfig(config); }, [config]);
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', config.theme);
    document.documentElement.style.setProperty('--accent', config.accent);
    document.documentElement.style.setProperty('--accent-soft', config.accentSoft);
    document.title = `${config.stationName} — Live`;
  }, [config]);

  // Keyboard: space = play/pause, d = theme toggle, c = customize
  useEffect(() => {
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.code === 'KeyD') setConfig(c => ({...c, theme: c.theme === 'dark' ? 'light' : 'dark'}));
      if (e.code === 'KeyC') setCustomizeOpen(o => !o);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  return (
    <ToastProvider>
      <div className="min-h-screen relative">
        {config.ambient && <div className="ambient fixed inset-0"/>}
        <div className="relative z-10">
          {/* Top bar */}
          <header className="px-6 lg:px-12 py-6 flex items-center justify-between gap-4">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 flex items-center justify-center text-white font-mono text-[14px] font-bold tracking-tight" style={{background: config.accent}}>
                {config.initials}
              </div>
              <div>
                <div className="font-serif text-[20px] leading-none tracking-tight">{config.stationName}</div>
                <div className="font-mono text-[10px] uppercase tracking-[0.18em] text-fg3 mt-1">{config.tagline}</div>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <button
                onClick={() => setConfig(c => ({...c, theme: c.theme === 'dark' ? 'light' : 'dark'}))}
                className="w-9 h-9 flex items-center justify-center border border-line hover:bg-card transition-colors focus-ring"
                aria-label="Toggle theme"
                title="Toggle theme (D)"
              >
                {config.theme === 'dark' ? <Sun size={15}/> : <Moon size={15}/>}
              </button>
              <button
                onClick={() => setCustomizeOpen(true)}
                className="inline-flex items-center gap-2 h-9 px-3 border border-line hover:bg-card transition-colors focus-ring font-mono text-[11px] uppercase tracking-wider"
                title="Customize (C)"
              >
                <Settings size={13}/>
                <span>Customize</span>
              </button>
            </div>
          </header>

          {/* Main */}
          <main className="px-6 lg:px-12 pb-12 pt-4 max-w-[1400px] mx-auto">
            <PlayerCore config={config} />
            <Footer accent={config.accent}/>
          </main>
        </div>
      </div>

      <CustomizeDrawer open={customizeOpen} onClose={() => setCustomizeOpen(false)} config={config} setConfig={setConfig}/>
    </ToastProvider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
