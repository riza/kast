volumes:
  kast_config:  # Persists generated kast.toml across container restarts
  kast_data:    # Persists kast.db (SQLite); subdirs are overlaid by bind mounts below

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        VERSION:    ${VERSION:-dev}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    ports:
      - "8080:8080"
      # Uncomment for HTTPS — also uncomment the ./certs volume below:
      # - "443:443"
      # WebRTC ICE UDP ports — required for remote WHEP (WebRTC) listeners.
      # Must match udp_port_min/udp_port_max in kast.toml (or KAST_WEBRTC_* vars).
      # - "40000-40100:40000-40100/udp"
    volumes:
      - kast_config:/app/config
      - kast_data:/app/data
      - ./server/data/music:/app/data/music
      - ./server/data/hls:/app/data/hls
      - ./server/data/mounts:/app/data/mounts
      - ./server/data/library:/app/data/library
      - ./server/data/playlists:/app/data/playlists
      # Uncomment to mount TLS certificates (Cloudflare Origin Cert or manual):
      # - ./certs:/app/certs:ro
    restart: unless-stopped
    environment:
      - GOGC=100
      # Override to set a fixed API key (leave unset to auto-generate on first run)
      - KAST_API_KEY=${KAST_API_KEY:-}
      # Override to set a fixed JWT signing secret (leave unset to auto-generate)
      - KAST_JWT_SECRET=${KAST_JWT_SECRET:-}
      # Public URL shown in HLS playlist links — set to your domain
      - KAST_PUBLIC_URL=${KAST_PUBLIC_URL:-}
      # Comma-free single origin for CORS — typically your dashboard URL
      - KAST_CORS_ORIGINS=${KAST_CORS_ORIGINS:-}
      # SSL — see README → Production Deployment for setup guide
      - KAST_SSL_ENABLED=${KAST_SSL_ENABLED:-}
      - KAST_SSL_CERT_FILE=${KAST_SSL_CERT_FILE:-}
      - KAST_SSL_KEY_FILE=${KAST_SSL_KEY_FILE:-}
      - KAST_SSL_DOMAINS=${KAST_SSL_DOMAINS:-}
      - KAST_TRUST_PROXY=${KAST_TRUST_PROXY:-}
      # WebRTC/WHEP configuration — required for remote WebRTC listeners.
      # Set KAST_WEBRTC_NAT_IPS to your server's public IP (comma-separated).
      # Set port range to match the UDP ports exposed above.
      - KAST_WEBRTC_NAT_IPS=${KAST_WEBRTC_NAT_IPS:-}
      - KAST_WEBRTC_UDP_PORT_MIN=${KAST_WEBRTC_UDP_PORT_MIN:-}
      - KAST_WEBRTC_UDP_PORT_MAX=${KAST_WEBRTC_UDP_PORT_MAX:-}

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        VERSION:    ${VERSION:-dev}
        API_URL:    ${API_URL:-http://server:8080}
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    environment:
      # Server URL used by Next.js rewrites to proxy /api/* and /hls/* server-side.
      # Keep the Docker service name here — browsers never see this address.
      - API_URL=${API_URL:-http://server:8080}
    restart: unless-stopped
    depends_on:
      - server
